<!DOCTYPE html>
<html>
<head><title>Load Configuration</title></head>
<body>
<!--
  The password field is a genuine credential field (type="password",
  autocomplete="current-password") and must not be vetoed by exclusion words.
-->
<div role="dialog" id="radix-_r_1a_" aria-describedby="radix-_r_1c_" aria-labelledby="radix-_r_1b_" data-state="open" class="UI-Modal__content" tabindex="-1" style="pointer-events: auto;">
  <div class="UI-Modal__header">
    <h2 id="radix-_r_1b_" class="UI-Modal__title">Load Configuration</h2>
  </div>
  <form class="space-y-4">
    <div class="UI-BasicField__field">
      <label for="uuid" class="UI-BasicField__fieldLabel" data-error="false">UUID<span class="UI-BasicField__fieldAsterisk">*</span></label>
      <div class="UI-Input__inputContainer">
        <input id="uuid" class="form-input UI-Input__root" data-disabled="false" data-readonly="false" aria-readonly="false" required="" placeholder="Enter your configuration UUID" value="" autocomplete="off" data-av-autocomplete="off">
      </div>
    </div>
    <div class="UI-BasicField__field">
      <label for="password" class="UI-BasicField__fieldLabel" data-error="false">Password<span class="UI-BasicField__fieldAsterisk">*</span></label>
      <div class="UI-Input__inputContainer">
        <div class="relative flex-1">
          <input class="form-input UI-Input__root" data-disabled="false" data-readonly="false" aria-readonly="false" required="" placeholder="Enter your configuration password" id="password" autocapitalize="off" autocomplete="current-password" spellcheck="false" type="password" value="">
          <button aria-controls="password" id="password" class="UI-ShowPassword" type="button" aria-label="Show password">eye</button>
        </div>
      </div>
    </div>
    <div class="flex justify-end gap-2">
      <button type="button" class="UI-Button_root"><span>Cancel</span></button>
      <button type="submit" class="UI-Button_root"><span>Load</span></button>
    </div>
  </form>
  <button type="button" class="UI-Button_root UI-Modal__close"><span>x</span></button>
</div>
</body>
</html>
