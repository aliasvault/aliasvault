25519 vs RSA-OAEP for Email Encryption                                                                                                                                                                                                                                                                                                                                 
  How Both Work (Same Pattern)                                                                                                                                                          
  Both use hybrid encryption: asymmetric crypto wraps a symmetric key, symmetric key encrypts the actual email.                                                                      
  
  Bridge: generate random AES key → encrypt email with AES → encrypt AES key with recipient's public key → upload to IPFS
  Client: decrypt AES key with private key → decrypt email with AES key

  The difference is only in that "wrap/unwrap the AES key" step.

  ---
  X25519 (Curve25519 / ECDH)

  ┌────────────────────┬─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┐   
  │       Aspect       │                                                                         Detail                                                                          │   
  ├────────────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤   
  │ Key size           │ 32 bytes public, 32 bytes private                                                                                                                       │   
  ├────────────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤   
  │ On-chain storage   │ Fits in Bytes<32> — native Compact type, no workarounds                                                                                                 │   
  ├────────────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤   
  │ How it works       │ Diffie-Hellman key agreement: bridge generates ephemeral X25519 keypair, combines with recipient's public key to derive shared secret, uses shared      │   
  │                    │ secret as AES key                                                                                                                                       │   
  ├────────────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤
  │ Browser support    │ crypto.subtle (Web Crypto API) — native, no libraries needed                                                                                            │   
  ├────────────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤   
  │ Node.js support    │ crypto.diffieHellman or crypto.subtle — native since Node 16                                                                                            │   
  ├────────────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤   
  │ Library            │ tweetnacl / libsodium-wrappers — crypto_box_seal() does it all in one call                                                                              │   
  │ alternative        │                                                                                                                                                         │   
  ├────────────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤   
  │ Performance        │ ~100x faster than RSA for key operations                                                                                                                │   
  ├────────────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤   
  │ Security margin    │ 128-bit equivalent — considered sufficient through 2030+                                                                                                │   
  ├────────────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤   
  │ Email size limit   │ None (AES handles the bulk)                                                                                                                             │   
  ├────────────────────┼─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤   
  │ Industry usage     │ Signal, WhatsApp, WireGuard, TLS 1.3                                                                                                                    │   
  └────────────────────┴─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┘   

  Encryption flow (bridge side):
  // ~5 lines with tweetnacl
  import { box } from 'tweetnacl';
  const ephemeral = box.keyPair();
  const sharedKey = box.before(recipientPublicKey, ephemeral.secretKey);
  const encrypted = box.after(emailBytes, nonce, sharedKey);
  // Send: [ephemeralPublicKey (32B) | nonce (24B) | encrypted]

  ---
  RSA-OAEP

  ┌─────────────────────┬─────────────────────────────────────────────────────────────────────────────────────┐
  │       Aspect        │                                       Detail                                        │
  ├─────────────────────┼─────────────────────────────────────────────────────────────────────────────────────┤
  │ Key size            │ 256+ bytes public (2048-bit minimum), 1200+ bytes private                           │
  ├─────────────────────┼─────────────────────────────────────────────────────────────────────────────────────┤
  │ On-chain storage    │ Needs Opaque<'Uint8Array'> — stored as opaque blob, visible on-chain                │
  ├─────────────────────┼─────────────────────────────────────────────────────────────────────────────────────┤
  │ How it works        │ Direct encryption: bridge encrypts AES key directly with recipient's RSA public key │
  ├─────────────────────┼─────────────────────────────────────────────────────────────────────────────────────┤
  │ Browser support     │ crypto.subtle — native                                                              │
  ├─────────────────────┼─────────────────────────────────────────────────────────────────────────────────────┤
  │ Node.js support     │ crypto.publicEncrypt — native                                                       │
  ├─────────────────────┼─────────────────────────────────────────────────────────────────────────────────────┤
  │ Library alternative │ Not needed, built into every runtime                                                │
  ├─────────────────────┼─────────────────────────────────────────────────────────────────────────────────────┤
  │ Performance         │ Slower key generation (~200ms vs ~1ms), slower encrypt/decrypt                      │
  ├─────────────────────┼─────────────────────────────────────────────────────────────────────────────────────┤
  │ Security margin     │ 112-bit (2048-bit) or 128-bit (3072-bit) equivalent                                 │
  ├─────────────────────┼─────────────────────────────────────────────────────────────────────────────────────┤
  │ Email size limit    │ RSA can only encrypt up to key_size - 42 bytes directly (hence hybrid)              │
  ├─────────────────────┼─────────────────────────────────────────────────────────────────────────────────────┤
  │ Industry usage      │ PGP/GPG, S/MIME, traditional PKI                                                    │
  └─────────────────────┴─────────────────────────────────────────────────────────────────────────────────────┘

  Encryption flow (bridge side):
  import { publicEncrypt, constants } from 'crypto';
  const encryptedAESKey = publicEncrypt(
    { key: recipientPublicKey, oaepHash: 'sha256', padding: constants.RSA_PKCS1_OAEP_PADDING },
    aesKey
  );
  // Send: [encryptedAESKey (256B) | iv (16B) | authTag (16B) | encrypted]

  ---
  Head-to-Head for AliasVault

  ┌─────────────────────────┬────────────────────────────────────────────┬────────────────────────────────────────────────┬────────┐
  │        Criterion        │                   X25519                   │                    RSA-OAEP                    │ Winner │
  ├─────────────────────────┼────────────────────────────────────────────┼────────────────────────────────────────────────┼────────┤
  │ On-chain key storage    │ Bytes<32> — native, compact                │ Opaque<'Uint8Array'> — opaque blob, 256+ bytes │ X25519 │
  ├─────────────────────────┼────────────────────────────────────────────┼────────────────────────────────────────────────┼────────┤
  │ On-chain gas cost       │ Minimal (32 bytes)                         │ Higher (256+ bytes stored)                     │ X25519 │
  ├─────────────────────────┼────────────────────────────────────────────┼────────────────────────────────────────────────┼────────┤
  │ Key generation speed    │ ~1ms                                       │ ~200ms                                         │ X25519 │
  ├─────────────────────────┼────────────────────────────────────────────┼────────────────────────────────────────────────┼────────┤
  │ Encrypt/decrypt speed   │ ~0.1ms                                     │ ~2ms                                           │ X25519 │
  ├─────────────────────────┼────────────────────────────────────────────┼────────────────────────────────────────────────┼────────┤
  │ Code complexity         │ Slightly more (ephemeral key + DH)         │ Simpler (direct encrypt)                       │ RSA    │
  ├─────────────────────────┼────────────────────────────────────────────┼────────────────────────────────────────────────┼────────┤
  │ Zero added dependencies │ Web Crypto works, but tweetnacl is cleaner │ Built-in everywhere                            │ RSA    │
  ├─────────────────────────┼────────────────────────────────────────────┼────────────────────────────────────────────────┼────────┤
  │ Forward secrecy         │ Yes (ephemeral keys per email)             │ No (same RSA key decrypts all emails)          │ X25519 │
  ├─────────────────────────┼────────────────────────────────────────────┼────────────────────────────────────────────────┼────────┤
  │ Key rotation            │ Trivial (32 bytes to update on-chain)      │ Heavier (regenerate 2048-bit pair)             │ X25519 │
  └─────────────────────────┴────────────────────────────────────────────┴────────────────────────────────────────────────┴────────┘

  The Forward Secrecy Argument

  This is the strongest differentiator. With X25519, the bridge generates a fresh ephemeral keypair per email. If the user's private key is ever compromised in the future, an       
  attacker would also need each ephemeral private key (which was discarded) to decrypt past emails. With RSA-OAEP, compromising the private key exposes all past emails.

  For a privacy-focused product like AliasVault, this matters.

  ---
  Recommendation

  X25519 + AES-256-GCM (via tweetnacl or native Web Crypto). The 32-byte key fits perfectly in Compact's Bytes<32>, gives forward secrecy per email, and aligns with the modern      
  crypto stack you're already using. The only "downside" is the DH pattern is slightly less intuitive than RSA's "encrypt with public key" — but crypto_box_seal() from libsodium    
  abstracts that away completely.

