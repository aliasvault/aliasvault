   Stress Test Results for Option A2
                                                                                                                                                                                     
  Issue 1: Bridge Becomes a Full Midnight Client                                                                                                                                     

  To call notifyNewMail, the bridge needs:

  ┌────────────────────────┬─────────────────────────────────────────────────────┐
  │      Requirement       │                       Detail                        │
  ├────────────────────────┼─────────────────────────────────────────────────────┤
  │ Wallet                 │ Own NIGHT balance for DUST generation               │
  ├────────────────────────┼─────────────────────────────────────────────────────┤
  │ Private state provider │ LevelDB to store relay secret key                   │
  ├────────────────────────┼─────────────────────────────────────────────────────┤
  │ Proof server           │ Access to ZK proof generation                       │
  ├────────────────────────┼─────────────────────────────────────────────────────┤
  │ ZK config              │ VaultRegistry proving keys (from compiled contract) │
  ├────────────────────────┼─────────────────────────────────────────────────────┤
  │ Indexer connection     │ To watch contract state, build transactions         │
  └────────────────────────┴─────────────────────────────────────────────────────┘

  The bridge isn't just an Express HTTP service anymore — it's a full Midnight DApp. This is architecturally significant but not unprecedented (the browser extension is already a   
  Midnight client).

  Verdict: Manageable, but must be scoped into the stories. The bridge service needs the same provider setup pattern used in the extension.

  ---
  Issue 2: Per-User Contract Instances

  Each user has their own VaultRegistry contract (deployed per vault). The bridge must:

  1. Know each user's VaultRegistry contract address (from AliasRegistry → owner → contract address)
  2. Submit notifyNewMail to the correct per-user contract
  3. Have relay authorization on each user's contract

  This means the bridge needs a mapping: alias → owner → contract address. The AliasRegistry can provide this, but it's a two-hop lookup per email.

  Verdict: Sound, but the AliasRegistry needs a circuit that returns (or stores) the owner's VaultRegistry contract address, not just the owner wallet hash.

  ---
  Issue 3: Manifest Readability Problem

  The bridge needs to append to the inbox manifest. But if the manifest is encrypted with the user's X25519 public key, the bridge can't read it back to append.

  Resolution: Don't encrypt the manifest. It contains only:
  {
    "emails": [
      { "cid": "bafyrei...", "timestamp": 1709553600, "from": "service@example.com" },
      { "cid": "bafyrei...", "timestamp": 1709554200, "from": "noreply@bank.com" }
    ]
  }

  The CIDs are random hashes. The actual email content is X25519-encrypted on IPFS. Someone who finds the manifest sees "this user has 2 emails from these senders" — but can't read 
  the content. The from field could be omitted or hashed if even sender metadata is sensitive.

  Verdict: Manifest is plaintext JSON on IPFS. Acceptable tradeoff — sender metadata is the only leak, and it can be hashed.

  ---
  Issue 4: CID Hash vs Actual CID

  Current pattern: vaultCidHash stores a hash of the CID on-chain. The actual CID lives in TypeScript private state. This works because the same entity (user) writes and reads.     

  For email notifications, the bridge writes and the user reads. The user can't derive the actual CID from the hash. The user needs the real CID to fetch from IPFS.

  Resolution: Store the manifest CID directly on the public ledger as Opaque<'string'>. This is the same pattern bboard uses for messages — visible on-chain but acceptable since    
  it's just a pointer to encrypted data.

  export ledger inboxManifestCid: Opaque<'string'>;  // actual IPFS CID, not a hash
  export ledger emailCount: Counter;

  export circuit notifyNewMail(manifestCid: Opaque<'string'>): [] {
    const cid = disclose(manifestCid);
    const rk = local_relay_key();
    assert(mailRelay == relayCommitment(rk), "Not authorized relay");
    emailCount.increment(1);
    inboxManifestCid = cid;
  }

  Extension reads inboxManifestCid from public ledger state → fetches manifest from IPFS → downloads individual encrypted emails.

  Verdict: Use Opaque<'string'> for manifest CID. Privacy tradeoff is minimal — CID alone reveals nothing about content.

  ---
  Issue 5: Race Condition — Concurrent Emails

  If two emails arrive within the same block window:
  1. Bridge updates manifest (adds email A), pins to IPFS, gets CID-1
  2. Bridge submits tx with CID-1
  3. Meanwhile, email B arrives — bridge updates manifest (adds A+B), pins, gets CID-2
  4. Bridge submits tx with CID-2
  5. Both txs hit the same block — only one wins (the other fails due to state contention)

  Resolution: Bridge serializes email processing per-user with a simple queue. One notifyNewMail tx at a time per user, retry on failure. For high-volume users, batch: collect      
  emails for N seconds, then one manifest update + one tx.

  Verdict: Standard concurrency problem. Queue + batching solves it.

  ---
  Issue 6: Relay Key Rotation

  If the bridge's relay secret key is compromised or rotated, every user's mailRelay commitment becomes invalid. Users would need to call setMailRelay() again with the new
  commitment.

  Resolution options:
  - a) Accept this — key rotation is rare, and users can re-authorize during next extension open
  - b) Store a Set of relay commitments (like backup wallets) — allows pre-registering the new key
  - c) Use a relay registry contract instead of per-user authorization

  For MVP, option (a) is fine. The extension can detect "relay not authorized" and prompt the user to re-authorize.

  Verdict: Acceptable for MVP. Document the rotation procedure.

  ---
  Issue 7: Scalability — Transactions Per Email

  100 emails/day = 100 on-chain transactions. At scale (10,000 users), that's 1M tx/day just for email notifications.

  Mitigation: Batch by default. Bridge collects emails per user for a configurable window (e.g., 30-60 seconds), updates manifest once, submits one tx. 100 emails/day → ~100 txs/day
   worst case (no batching) or ~1440 txs/day across all users with 1-minute batching.

  Verdict: Batching is essential. Story 5.6 must include batch configuration.

  ---
  Issue 8: AliasRegistry → VaultRegistry Lookup Chain

  When an email arrives for alice@alias.id, the bridge needs:
  1. AliasRegistry.getOwner("alice") → owner wallet hash
  2. Owner wallet hash → VaultRegistry contract address (how?)
  3. VaultRegistry → emailPublicKey (for encryption)
  4. VaultRegistry → notifyNewMail() (for notification)

  Step 2 is the gap. Currently nothing maps wallet hash to contract address.

  Resolution options:
  - a) AliasRegistry stores contract address alongside owner: claimAlias takes contract address as parameter
  - b) Separate lookup: bridge maintains a cache of wallet → contract address (populated during alias claim)
  - c) AliasRegistry stores both: Map<aliasHash, AliasRecord> where AliasRecord includes contract address

  Option (a) is cleanest — when claiming an alias, the user provides their VaultRegistry contract address. The AliasRegistry stores it.

  Verdict: AliasRegistry must store VaultRegistry contract address per alias. Update Story 5.1 AC.

